name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key + known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key exactly, preserve newlines
          printf '%s\n' "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/deploy_key

          # Strip CRLF (Windows) if present
          sed -i 's/\r$//' ~/.ssh/deploy_key

          chmod 600 ~/.ssh/deploy_key

          # Add host key to known_hosts
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Validate SSH key format
        shell: bash
        run: |
          set -euo pipefail
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          echo "SSH key parses OK"

      - name: Debug SSH auth (temporary)
        shell: bash
        run: |
          set -euo pipefail
          ssh -vvv -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "echo connected"

      - name: Deploy via SSH
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd ~/cs178-lab09 && git pull origin main"